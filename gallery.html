<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gallery | Jimmy Butterfield</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <!-- menu header -->
    <div id="header-placeholder"></div>

    <!-- load header -->
    <script>
      fetch("header.html")
        .then((res) => res.text())
        .then((html) => {
          document.getElementById("header-placeholder").innerHTML = html;
        });
    </script>

    <main class="gallery">
      <h1>Project Gallery</h1>

      <div class="feature-box" id="featureBox">
        <img id="featureImg" src="./img/quiz.png" alt="Sexuality Quiz project image" />

        <h2 id="featureTitle">Sexuality Quiz</h2>

        <p id="featureDesc">
          Sexuality Quiz is an interactive digital writing project that plays with the
          familiar language of online personality tests, pop psychology, and internet
          self-discovery.
        </p>

        <p id="featureMeta">
          <small>Form: Twine / Interactive Quiz | Year: 2025</small>
        </p>
      </div>

      <div class="nav-buttons">
        <button onclick="previousFeature()">Previous</button>
        <button onclick="nextFeature()">Next</button>
      </div>
    </main>

    <script>
      const features = [
        {
          img: "./img/quiz.png",
          title: "Sexuality Quiz",
          desc:
            "Sexuality Quiz is an interactive digital writing project that plays with the familiar language of online personality tests, pop psychology, and internet self-discovery.",
          meta: "Form: Twine / Interactive Quiz | Year: 2025"
        },
        {
          img: "./img/quiz.png",
          title: "Digital Writing as Play",
          desc:
            "The project uses humour, exaggeration, and quiz logic to explore how digital forms can both reveal and distort identity.",
          meta: "Theme: Humour, Queerness, Identity, Interactivity"
        },
        {
          img: "./img/quiz.png",
          title: "Behind the Work",
          desc:
            "The piece was developed as part of a digital writing practice, combining code, visual design, sound, branching pathways, and a deliberately playful authorial voice.",
          meta: "Process: Twine, HTML, CSS, Audio, Visual Design"
        }
      ];

      let current = 0;

      function updateFeature() {
        const feature = features[current];

        document.getElementById("featureImg").src = feature.img;
        document.getElementById("featureTitle").textContent = feature.title;
        document.getElementById("featureDesc").textContent = feature.desc;
        document.getElementById("featureMeta").innerHTML =
          "<small>" + feature.meta + "</small>";
      }

      function nextFeature() {
        current = (current + 1) % features.length;
        updateFeature();
      }

      function previousFeature() {
        current = (current - 1 + features.length) % features.length;
        updateFeature();
      }
    </script>
  </body>
</html>
